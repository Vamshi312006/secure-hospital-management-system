services:
  - type: web
    name: secure-healthcare-platform
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn run:app

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: FLASK_DEBUG
        value: "0"

      - key: DATABASE_URL
        fromDatabase:
          name: secure-healthcare-db
          property: connectionString

databases:
  - name: secure-healthcare-db
    plan: free
