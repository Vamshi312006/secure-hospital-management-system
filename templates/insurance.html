{% extends "base.html" %}
{% block title %}Insurance{% endblock %}

{% block content %}
<section style="padding:4rem 5%;">
  <h2 class="services-title">Insurance Details</h2>

  <div style="max-width:900px;margin:0 auto;">
    <div class="card" style="padding:1rem;">
      {% for ins in insurance %}
        <div style="padding:0.8rem 0;border-bottom:1px solid #eee;">
          <strong>Provider:</strong> {{ ins[2] }} <br>
          <strong>Policy #:</strong> {{ ins[3] }} <br>
          <strong>Coverage:</strong> {{ ins[4] }}%
        </div>
      {% else %}
        <p style="padding:1rem;">No insurance records found.</p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
