{% extends "layouts/base.html" %}

{% block title %}
{{ "Edit Insurance" if edit_mode else "New Insurance" }}
{% endblock %}

{% block page_css %}
<link rel="stylesheet"
href="{{ url_for('static', filename='css/pages/insurance.css') }}">
{% endblock %}

{% block content %}

<div class="page-header">

<div>

<h1>

{{ "Edit Insurance" if edit_mode else "New Insurance" }}

</h1>

</div>

</div>

<form
method="POST"
action="{% if edit_mode %}{{ url_for('insurance.edit', insurance_id=insurance.id) }}{% else %}{{ url_for('insurance.create') }}{% endif %}"
>

<input
type="hidden"
name="csrf_token"
value="{{ csrf_token() }}"
>

<div class="panel">

<div class="panel-body">

<div class="form-group">

<label>Provider</label>

<input
class="form-control"
name="provider"
value="{{ insurance.provider if edit_mode else '' }}"
required
>

</div>

<div class="form-group">

<label>Policy Number</label>

<input
class="form-control"
name="policy_number"
value="{{ insurance.policy_number if edit_mode else '' }}"
required
>

</div>

<div class="form-group">

<label>Coverage Type</label>

<input
class="form-control"
name="coverage_type"
value="{{ insurance.coverage_type if edit_mode else '' }}"
>

</div>

<div class="form-group">

<label>Contact Number</label>

<input
class="form-control"
name="contact_number"
value="{{ insurance.contact_number if edit_mode else '' }}"
>

</div>

<div class="form-group">

<label>Email</label>

<input
class="form-control"
type="email"
name="email"
value="{{ insurance.email if edit_mode else '' }}"
>

</div>

</div>

</div>

<div class="page-actions">

<button
class="btn btn-primary"
type="submit"
>

{{ "Update" if edit_mode else "Save" }}

</button>

<a
href="{{ url_for('insurance.index') }}"
class="btn btn-secondary"
>

Cancel

</a>

</div>

</form>

{% endblock %}
