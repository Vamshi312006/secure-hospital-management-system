{% extends "layouts/base.html" %}

{% block title %}
Add Doctor
{% endblock %}

{% block content %}

<div class="page-header">

    <div>

        <span class="breadcrumb">
            Home /
            Doctors /
            <strong>New Doctor</strong>
        </span>

        <h1>Add Doctor</h1>

        <p>Create a new doctor account.</p>

    </div>

    <div class="page-actions">

        <a
            href="{{ url_for('doctor.index') }}"
            class="btn btn-secondary"
        >
            Cancel
        </a>

    </div>

</div>

<form method="POST" class="form">

    <div class="panel">

        <div class="panel-header">
            <h2>Account Information</h2>
        </div>

        <div class="panel-body">

            <div class="form-row">

                <div class="form-group">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        class="form-control"
                        type="text"
                        name="username"
                        required
                    >

                </div>

                <div class="form-group">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        class="form-control"
                        type="email"
                        name="email"
                        required
                    >

                </div>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Password
                </label>

                <input
                    class="form-control"
                    type="password"
                    name="password"
                    required
                >

            </div>

        </div>

    </div>

    <br>

    <div class="panel">

        <div class="panel-header">
            <h2>Professional Information</h2>
        </div>

        <div class="panel-body">

            <div class="form-row">

                <div class="form-group">

                    <label class="form-label">
                        License Number
                    </label>

                    <input
                        class="form-control"
                        type="text"
                        name="license_number"
                        required
                    >

                </div>

                <div class="form-group">

                    <label class="form-label">
                        Department
                    </label>

                    <select
                        class="form-control"
                        name="department_id"
                        required
                    >

                        {% for department in departments %}

                        <option value="{{ department.id }}">
                            {{ department.name }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <div class="form-row">

                <div class="form-group">

                    <label class="form-label">
                        Specialization
                    </label>

                    <input
                        class="form-control"
                        type="text"
                        name="specialization"
                        required
                    >

                </div>

                <div class="form-group">

                    <label class="form-label">
                        Qualification
                    </label>

                    <input
                        class="form-control"
                        type="text"
                        name="qualification"
                    >

                </div>

            </div>

            <div class="form-row">

                <div class="form-group">

                    <label class="form-label">
                        Phone
                    </label>

                    <input
                        class="form-control"
                        type="text"
                        name="phone"
                    >

                </div>

                <div class="form-group">

                    <label class="form-label">
                        Experience (Years)
                    </label>

                    <input
                        class="form-control"
                        type="number"
                        name="experience"
                        min="0"
                        value="0"
                    >

                </div>

            </div>

        </div>

    </div>

    <br>

    <div class="page-actions">

        <a
            href="{{ url_for('doctor.index') }}"
            class="btn btn-secondary"
        >
            Cancel
        </a>

        <button
            type="submit"
            class="btn btn-primary"
        >
            Save Doctor
        </button>

    </div>

</form>

{% endblock %}
