{% extends "base.html" %}
{% block title %}Medicines{% endblock %}

{% block content %}
<section style="padding:4rem 5%;">
  <h2 class="services-title">Medicines / Pharmacy</h2>

  <div style="max-width:1000px;margin:0 auto;">
    <div class="card" style="padding:1rem;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="text-align:left;"><th>ID</th><th>Name</th><th>Brand</th><th>Stock</th><th>Price</th><th>Expiry</th></tr>
        </thead>
        <tbody>
          {% for m in medicines %}
          <tr style="border-top:1px solid #eee;">
            <td>{{ m[0] }}</td>
            <td>{{ m[1] }}</td>
            <td>{{ m[2] }}</td>
            <td>{{ m[4] }}</td>
            <td>₹{{ m[5] }}</td>
            <td>{{ m[6] }}</td>
          </tr>
          {% else %}
          <tr><td colspan="6" style="padding:1rem;">No medicines found.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}
